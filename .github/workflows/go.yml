name: go
on:
  push:
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: src/os-conf-acceptance-tests/go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          working-directory: src/os-conf-acceptance-tests/
